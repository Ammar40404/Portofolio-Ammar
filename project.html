<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
    <title>MUAMMAR - Project</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👨‍💻</text></svg>">
</head>
<body>

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-profile">
            <div class="sidebar-avatar">
                <img src="foto/foto1.jpeg" alt="Muammar">
            </div>
            <div class="sidebar-name">Muammar</div>
            <div class="sidebar-role">Informatics Engineering</div>
        </div>

        <nav class="sidebar-nav">
            <a href="index.html" class="nav-item">
                <i class="fas fa-house"></i>
                <span>Home</span>
            </a>
            <a href="about.html" class="nav-item">
                <i class="fas fa-user"></i>
                <span>Tentang</span>
            </a>
            <a href="project.html" class="nav-item active">
                <i class="fas fa-briefcase"></i>
                <span>Project</span>
            </a>
            <a href="contact.html" class="nav-item">
                <i class="fas fa-phone"></i>
                <span>Kontak</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <div class="sidebar-social">
                <a href="https://www.linkedin.com/in/muammar473/" target="_blank" aria-label="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
                <a href="https://github.com/Ammar40404" target="_blank" aria-label="GitHub"><i class="fab fa-github"></i></a>
                <a href="mailto:muamar.idm008@gmail.com" aria-label="Email"><i class="fas fa-envelope"></i></a>
            </div>
        </div>
    </aside>

    <!-- MAIN WRAPPER -->
    <div class="main-wrapper">

        <!-- TOPBAR -->
        <header class="topbar">
            <div class="topbar-left">
                <span class="topbar-page">Project</span>
            </div>
            <div class="topbar-right">
                <button id="theme-toggle" class="theme-btn" aria-label="Toggle theme">
                    <i class="fas fa-moon" id="theme-icon"></i>
                    <span id="theme-label">Dark Mode</span>
                </button>
            </div>
        </header>

        <!-- PAGE CONTENT -->
        <main class="page-content">

            <!-- Filter -->
            <div class="project-filter-bar">
                <button class="filter-btn active" data-category="all">Semua</button>
                <button class="filter-btn" data-category="web">Website</button>
                <button class="filter-btn" data-category="uiux">Design</button>
                <button class="filter-btn" data-category="branding">Branding</button>
                <button class="filter-btn" data-category="mobile">Mobile</button>
            </div>

            <!-- Projects Grid -->
            <div class="projects-grid" id="projects-grid">

                <!-- Project 1 — Branding -->
                <div class="project-item" data-category="branding">
                    <div class="project-card" data-project="Northbird Logo Design">
                        <div class="project-img-wrap">
                            <img src="foto/foto12.png" alt="Northbird Logo Design" loading="lazy">
                            <span class="proj-badge branding">Branding</span>
                            <div class="proj-overlay">
                                <span class="proj-overlay-label">Branding &amp; Identity</span>
                                <h3>Northbird Logo Design</h3>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Project 2 — UI/UX -->
                <div class="project-item" data-category="uiux">
                    <div class="project-card" data-project="Ronas IT | UI/UX Team">
                        <div class="project-img-wrap">
                            <img src="foto/foto11.png" alt="Ronas IT UI/UX Team" loading="lazy">
                            <span class="proj-badge uiux">UI/UX</span>
                            <div class="proj-overlay">
                                <span class="proj-overlay-label">UI/UX Design</span>
                                <h3>Ronas IT | UI/UX Team</h3>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Project 3 — Web -->
                <div class="project-item" data-category="web">
                    <div class="project-card" data-project="Website Monitoring Progres Hafalan">
                        <div class="project-img-wrap">
                            <img src="foto/foto13.png" alt="Website Monitoring Progres Hafalan" loading="lazy">
                            <span class="proj-badge web">Web</span>
                            <div class="proj-overlay">
                                <span class="proj-overlay-label">Web Development</span>
                                <h3>Website Monitoring Progres Hafalan</h3>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Project 4 — Mobile -->
                <div class="project-item" data-category="mobile">
                    <div class="project-card" data-project="Mobile App Design">
                        <div class="project-img-wrap">
                            <img src="foto/foto14.png" alt="Mobile App Design" loading="lazy">
                            <span class="proj-badge mobile">Mobile</span>
                            <div class="proj-overlay">
                                <span class="proj-overlay-label">Mobile Design</span>
                                <h3>Mobile App Design</h3>
                            </div>
                        </div>
                    </div>
                </div>

            </div>

        </main>
    </div>

    <!-- MOBILE BOTTOM NAV -->
    <nav class="bottom-nav">
        <a href="index.html" class="bnav-item">
            <i class="fas fa-house"></i>
            <span>Home</span>
        </a>
        <a href="about.html" class="bnav-item">
            <i class="fas fa-user"></i>
            <span>Tentang</span>
        </a>
        <a href="project.html" class="bnav-item active">
            <i class="fas fa-briefcase"></i>
            <span>Project</span>
        </a>
        <a href="contact.html" class="bnav-item">
            <i class="fas fa-phone"></i>
            <span>Kontak</span>
        </a>
    </nav>

    <script src="script.js"></script>
    <script>
        // Navigate to detail page on card click
        document.addEventListener('DOMContentLoaded', function () {
            document.querySelectorAll('.project-card').forEach(function(card) {
                card.addEventListener('click', function() {
                    var title = this.getAttribute('data-project');
                    if (title) {
                        window.location.href = 'project-detail.html?project=' + encodeURIComponent(title);
                    }
                });
            });
        });
    </script>
</body>
</html>
